services:
  db:
    image: postgres:17-alpine
    container_name: example_postgres_debug
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: example_sqlx_payment_gateway
      
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - "postgres"
      - "-c"
      - "max_connections=1000"             
      - "-c"
      - "shared_buffers=4GB"
      - "-c"
      - "effective_cache_size=12GB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "max_worker_processes=8"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=8"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_line_prefix=%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h "
      - "-c"
      - "superuser_reserved_connections=10"
      - "-c"
      - "idle_in_transaction_session_timeout=60000" 
      - "-c"
      - "statement_timeout=30000"  
    
    volumes:
      - postgres_payment_tonic-debug-data:/var/lib/postgresql/data
    
    networks:
      - app_payment_tonic_debug
    
    ports:
      - "5432:5432"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d example_sqlx_payment_gateway"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G
        reservations:
          cpus: '2'
          memory: 8G

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    restart: unless-stopped
    
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@db:5432/example_sqlx_payment_gateway?sslmode=disable&connect_timeout=10"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
      PG_EXPORTER_DISABLE_DEFAULT_METRICS: "false"
      PG_EXPORTER_DISABLE_SETTINGS_METRICS: "false"
    
    ports:
      - "9187:9187"
    
    depends_on:
      - db
    
    networks:
      - app_payment_tonic_debug
    
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer_debug
    restart: unless-stopped
    
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: example_sqlx_payment_gateway
      
      AUTH_TYPE: scram-sha-256
      
      POOL_MODE: transaction
      
      DEFAULT_POOL_SIZE: 200              # Increased from 120
      MIN_POOL_SIZE: 50                   # Increased from 30
      MAX_DB_CONNECTIONS: 800             # Increased from 300
      MAX_CLIENT_CONN: 10000               # Increased from 5000
      RESERVE_POOL_SIZE: 100               # Increased from 40
      RESERVE_POOL_TIMEOUT: 5             # Increased from 5
      
      SERVER_IDLE_TIMEOUT: 600            # 10 minutes
      QUERY_TIMEOUT: 30                   # 15 seconds
      SERVER_CONNECT_TIMEOUT: 10
      SERVER_LOGIN_RETRY: 5
      
      SERVER_RESET_QUERY: DISCARD ALL
      SERVER_RESET_QUERY_ALWAYS: 0
      
      TCP_KEEPALIVE: 1
      TCP_KEEPCNT: 5
      TCP_KEEPIDLE: 30
      TCP_KEEPINTVL: 10
      
      ADMIN_USERS: postgres
      STATS_USERS: postgres
      
      LOG_CONNECTIONS: 0
      LOG_DISCONNECTIONS: 0
      LOG_POOLER_ERRORS: 1
    
    ports:
      - "6432:5432"
    
    depends_on:
      db:
        condition: service_healthy
    
    networks:
      - app_payment_tonic_debug
    
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d pgbouncer -c 'SHOW POOLS;' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger-payment-tonic_debug
    ports:
      - "16686:16686"
      - "14250:14250"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - app_payment_tonic_debug

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter-tonic_debug
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    networks:
      - app_payment_tonic_debug

  prometheus:
    image: prom/prometheus
    container_name: prometheus-payment-tonic_debug
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    networks:
      - app_payment_tonic_debug

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-payment-tonic_debug
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-payment-tonic-debug-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - app_payment_tonic_debug

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
      - "8889:8889"
    volumes:
      - ./observability/otel-collector.yaml:/etc/otel-collector-config.yaml:ro
    command: [ "--config=/etc/otel-collector-config.yaml" ]
    restart: unless-stopped
    networks:
      - app_payment_tonic_debug

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager_debug
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - app_payment_tonic_debug

  loki:
    container_name: loki_debug
    image: grafana/loki:3.5.8
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_payment_tonic_debug_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app_payment_tonic_debug

  
  redis-auth:
    image: redis:7.4
    container_name: redis_auth_debug
    command: >
      redis-server
      --requirepass dragon_knight
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-backlog 511
      --timeout 0
      --tcp-keepalive 300
      --maxclients 10000
    ports:
      - "6380:6379"
    volumes:
      - redis_auth_debug_data:/data 
